<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light Agent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>💬 Light Agent</h2>
                <button class="btn-new" onclick="createSession()">+ 新建对话</button>
            </div>
            <div class="session-list" id="sessionList">
                <!-- 会话列表 -->
            </div>
            <div class="sidebar-footer">
                <button class="btn-settings" onclick="openSettings()">⚙️ 设置</button>
            </div>
        </aside>

        <!-- 主区域 -->
        <main class="main">
            <!-- 顶栏 -->
            <header class="main-header">
                <div class="session-info">
                    <span id="sessionTitle">选择或新建对话</span>
                </div>
                <div class="header-actions">
                    <select id="modelSelect" onchange="switchModel()">
                        <option value="">默认模型</option>
                    </select>
                </div>
            </header>

            <!-- 消息区 -->
            <div class="chat-container" id="chatContainer">
                <div class="welcome">
                    <h1>🤖 Light Agent</h1>
                    <p>轻量化 AI 对话助手</p>
                    <p class="hint">点击「新建对话」开始</p>
                </div>
            </div>

            <!-- 输入区 -->
            <div class="input-area">
                <textarea id="messageInput" placeholder="输入消息..." rows="1"
                    onkeydown="handleKeyDown(event)"></textarea>
                <button class="btn-send" onclick="sendMessage()" id="sendBtn">发送</button>
            </div>
        </main>
    </div>

    <!-- 设置弹窗 -->
    <div class="modal-overlay" id="settingsModal" onclick="closeSettings(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>⚙️ 设置</h3>
                <button class="btn-close" onclick="closeSettings()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-group">
                    <label>API Key</label>
                    <input type="password" id="settingApiKey" placeholder="输入 API Key">
                </div>
                <div class="setting-group">
                    <label>Provider</label>
                    <select id="settingProvider">
                        <option value="openai">OpenAI</option>
                        <option value="deepseek">DeepSeek</option>
                        <option value="kimi">Kimi (Moonshot)</option>
                        <option value="minimax">MiniMax</option>
                        <option value="grok">Grok (xAI)</option>
                        <option value="openrouter">OpenRouter</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label>Model</label>
                    <input type="text" id="settingModel" placeholder="留空使用默认模型">
                </div>
                <div class="setting-group">
                    <label>System Prompt</label>
                    <textarea id="settingPrompt" rows="4" placeholder="系统提示词"></textarea>
                </div>
                <div class="setting-group">
                    <label>Context Window</label>
                    <input type="number" id="settingContext" value="128000">
                </div>
                <div class="setting-group">
                    <label>Temperature</label>
                    <input type="number" id="settingTemp" value="0.7" step="0.1" min="0" max="2">
                </div>
                <div class="setting-group">
                    <label>Server URL</label>
                    <input type="text" id="settingServer" placeholder="http://localhost:8000">
                </div>
                <div class="setting-group">
                    <label>User ID</label>
                    <input type="text" id="settingUserId" placeholder="你的用户名">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-save" onclick="saveSettings()">保存</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
